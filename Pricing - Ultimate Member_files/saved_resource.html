        <style>.c-FabButtonCritical__button {
  -webkit-appearance: none;
     -moz-appearance: none;
          appearance: none;
  align-items: center;
  border-radius: 200px;
  border: none;
  bottom: 0;
  color: white;
  cursor: pointer;
  display: block;
  height: 60px;
  justify-content: center;
  min-width: 60px;
  margin: 0;
  line-height: 60px;
  outline: none !important;
  padding: 0;
  position: relative;
  transition: transform 200ms linear;
  -webkit-user-select: none;
     -moz-user-select: none;
          user-select: none;
  z-index: 999;
  -webkit-tap-highlight-color: transparent;

  backface-visibility: hidden;
}

.c-FabButtonCritical__button:active {
    cursor: pointer;
    transform: scale(0.96);
  }

.c-FabButtonCritical__button::-moz-focus-inner {
    border: 0;
  }

.c-FabButtonCritical__button:before {
    --focus-offset: 5px;

    content: '';
    border-radius: 20px;
    bottom: var(--focus-offset);
    box-shadow: 0 0 0 2px var(--text-color);
    left: var(--focus-offset);
    pointer-events: none;
    position: absolute;
    right: var(--focus-offset);
    top: var(--focus-offset);
    opacity: 0;
    background: transparent;
    z-index: 3;
  }

.c-FabButtonCritical__button:focus:before, .c-FabButtonCritical__button.is-focused:before {
      opacity: 1;
    }

.c-FabButtonCritical__button:focus:not(:focus-visible):before {
      opacity: 0;
    }

.c-FabButtonCritical__button:focus-visible:before {
      opacity: 1 !important;
      transition: opacity ease 0.2s;
    }

.c-FabButtonCritical__button--text-only {
  height: 42px;
  line-height: 42px;
  text-align: center;
}

.c-FabButtonCritical__button--text-only .c-FabButtonCritical__squircle-background {
    height: 42px;
    width: 42px;
  }

.c-FabButtonCritical__button--is-loading {
  cursor: pointer;
  transform: scale(0.96);
}

.c-FabButtonCritical__text {
  display: block;
  font-size: 14px;
  font-weight: 600;
  padding: 0 20px 0 54px;
  white-space: nowrap;
  line-height: 14px;
}

.c-FabButtonCritical__text--text-only {
  padding: 0 15px;
}

.c-FabButtonCritical__text--align-left {
  padding: 0 54px 0 20px;
}

.c-FabButtonCritical__text--hide-on-mobile {
    display: none;
}
  }

.c-FabButtonCritical__icon {
  cursor: pointer;
  display: flex;
  height: 100%;
  justify-content: center;
  left: 0;
  opacity: 1;
  pointer-events: none;
  position: absolute;
  text-indent: -99999px;
  top: 0;
  width: 60px;
}

.c-FabButtonCritical__icon path {
    fill: currentColor;
  }

.c-FabButtonCritical__icon mask path {
    fill: white;
  }

.c-FabButtonCritical__icon path.line-path {
    fill: transparent;
    stroke: currentColor;
  }

.c-FabButtonCritical__icon--text-align-left {
  left: auto;
  right: 0;
}

.c-FabButtonCritical__squircle-background {
  position: absolute;
  top: 0;
  height: 60px;
  width: 60px;
  z-index: -1;
  pointer-events: none;
}

.c-FabButtonCritical__squircle-background.position-left {
    left: 0;
  }

.c-FabButtonCritical__squircle-background.position-right {
    right: 0;
  }

.c-FabButtonCritical__squircle-background svg {
    fill: var(--background-color);
  }
</style>
